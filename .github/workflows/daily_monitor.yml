name: Beauty Sale Monitor – Daily 3 PM Alert

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Beauty Sale Monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python src/monitor.py
